document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:700; color:{{ c.color }}; font-variant-numeric:tabular-nums;\">{{ c.v }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- trajectory quadrant -->\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:0 0 11px;\">\n        <div style=\"font-size:14px; font-weight:700;\">ทิศทางแนวโน้ม — ควรเข้าช่วยใครก่อน<\u002Fdiv>\n        <div style=\"font-size:clamp(9.5px,2.6vw,11.5px); color:#8b96a4;\">จัดกลุ่มจากระดับล่าสุด × แนวโน้ม 3 เดือนล่าสุด · ตัวเลขเล็ก = การเปลี่ยนแปลงเฉลี่ยต่อเดือน<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(258px,1fr)); gap:14px; margin-bottom:22px;\">\n        <sc-for list=\"{{ an.groupCards }}\" as=\"g\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff; border:1px solid #e4e8ed; border-radius:14px; overflow:hidden;\">\n            <div style=\"background:{{ g.headBg }}; padding:13px 16px; border-bottom:1px solid #eef1f4;\">\n              <div style=\"display:flex; align-items:center; gap:8px;\">\n                <div style=\"font-size:13.5px; font-weight:700; color:#1b2430; margin-right:auto;\">{{ g.title }}<\u002Fdiv>\n                <div style=\"font-size:19px; font-weight:800; color:{{ g.accent }}; font-variant-numeric:tabular-nums; line-height:1;\">{{ g.count }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:11px; color:#7a8593; margin-top:3px;\">{{ g.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:5px 7px 8px;\">\n              <sc-for list=\"{{ g.list }}\" as=\"d\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ d.onClick }}\" style=\"display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:8px; cursor:pointer;\" style-hover=\"background:#f6f8f9;\">\n                  <div style=\"font-size:12.5px; font-weight:600; color:#1b2430; margin-right:auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ d.name }}<\u002Fdiv>\n                  <div style=\"font-size:11px; font-weight:600; color:{{ d.slColor }}; font-variant-numeric:tabular-nums; white-space:nowrap; min-width:44px; text-align:right;\">{{ d.slArrow }} {{ d.sl }}<\u002Fdiv>\n                  <div style=\"font-size:13px; font-weight:700; color:#1b2430; font-variant-numeric:tabular-nums; min-width:52px; text-align:right;\">{{ d.v }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font-size:11px; color:#9aa3b0; padding:5px 9px 2px;\">{{ g.moreText }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- cause ownership -->\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:0 0 11px;\">\n        <div style=\"font-size:14px; font-weight:700;\">แยกที่มาของปัญหา — ของเราหรือของลูกค้า<\u002Fdiv>\n        <div style=\"font-size:clamp(9.5px,2.6vw,11.5px); color:#8b96a4;\">เทียบ “ทุกสาเหตุ → ตัดสาเหตุลูกค้า” · เดือนล่าสุด · หมวด {{ catName }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:14px; margin-bottom:22px;\">\n        <div style=\"background:#fff; border:1px solid #e4e8ed; border-radius:14px; overflow:hidden;\">\n          <div style=\"padding:14px 16px; border-bottom:1px solid #eef1f4;\">\n            <div style=\"font-size:13.5px; font-weight:700;\">ส่วนใหญ่มาจากฝั่งลูกค้า<\u002Fdiv>\n            <div style=\"font-size:11px; color:#7a8593; margin-top:3px;\">ตัดสาเหตุลูกค้าแล้วดีขึ้นมาก — ควรประสานลูกค้า/ปรับเงื่อนไขจัดส่ง<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:5px 7px 8px;\">\n            <sc-for list=\"{{ an.fromCust }}\" as=\"d\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ d.onClick }}\" style=\"display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:8px; cursor:pointer;\" style-hover=\"background:#f6f8f9;\">\n                <div style=\"min-width:0; margin-right:auto;\">\n                  <div style=\"font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ d.name }}<\u002Fdiv>\n                  <sc-if value=\"{{ isWide }}\"><div style=\"font-size:10.5px; color:#9aa3b0;\">{{ d.regionName }}<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-size:11px; color:#7a8593; font-variant-numeric:tabular-nums; white-space:nowrap;\">{{ d.all }} → {{ d.excl }}<\u002Fdiv>\n                <div style=\"font-size:11.5px; font-weight:700; color:#1f9d57; background:#e9f6ee; padding:4px 8px; border-radius:8px; font-variant-numeric:tabular-nums; min-width:48px; text-align:center;\">{{ d.gap }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #e4e8ed; border-radius:14px; overflow:hidden;\">\n          <div style=\"padding:14px 16px; border-bottom:1px solid #eef1f4;\">\n            <div style=\"font-size:13.5px; font-weight:700;\">เป็นปัญหาของเราเอง (operation)<\u002Fdiv>\n            <div style=\"font-size:11px; color:#7a8593; margin-top:3px;\">ตัดสาเหตุลูกค้าแล้วยังต่ำกว่า 80% — ปัญหาอยู่ที่กระบวนการภายใน<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:5px 7px 8px;\">\n            <sc-for list=\"{{ an.fromUs }}\" as=\"d\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ d.onClick }}\" style=\"display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:8px; cursor:pointer;\" style-hover=\"background:#f6f8f9;\">\n                <div style=\"min-width:0; margin-right:auto;\">\n                  <div style=\"font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ d.name }}<\u002Fdiv>\n                  <sc-if value=\"{{ isWide }}\"><div style=\"font-size:10.5px; color:#9aa3b0;\">{{ d.regionName }}<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-size:11px; color:#9aa3b0; font-variant-numeric:tabular-nums; white-space:nowrap;\">ตัดลูกค้าแล้ว<\u002Fdiv>\n                <div style=\"font-size:11.5px; font-weight:700; color:#bf372a; background:#fbe5e1; padding:4px 8px; border-radius:8px; font-variant-numeric:tabular-nums; min-width:54px; text-align:center;\">{{ d.excl }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n    <\u002Fsc-if>\n    <!-- ===================== DAILY ===================== -->\n    <sc-if value=\"{{ showDaily }}\">\n    <section data-screen-label=\"รายวัน\">\n      <dc-import name=\"SLADaily\" days=\"{{ dly.days }}\" rows=\"{{ dly.rows }}\" grand=\"{{ dly.grand }}\" metric=\"{{ dly.metric }}\" month-name=\"{{ dly.monthName }}\" sample=\"{{ dly.sample }}\" on-pick=\"{{ dly.onPick }}\" hint-size=\"100%,700px\"><\u002Fdc-import>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== COMPARE ===================== -->\n    <sc-if value=\"{{ showCompare }}\">\n    <section data-screen-label=\"เทียบช่วง\">\n      <dc-import name=\"SLACompare\" rows=\"{{ cmpData.rows }}\" grand=\"{{ cmpData.grand }}\" metric=\"{{ cmpData.metric }}\" window-a=\"{{ cmpData.windowA }}\" window-b=\"{{ cmpData.windowB }}\" cat-name=\"{{ cmpData.catName }}\" months=\"{{ cmpData.months }}\" narrow=\"{{ isNarrow }}\" sample=\"{{ cmpData.sample }}\" on-pick=\"{{ cmpData.onPick }}\" hint-size=\"100%,720px\"><\u002Fdc-import>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===================== COMPARE TABLE (both metrics) ===================== -->\n    <sc-if value=\"{{ showCompare2 }}\">\n    <section data-screen-label=\"เทียบช่วงตาราง\">\n      <dc-import name=\"SLATableCompare\" rows=\"{{ cmpData.rows }}\" grand=\"{{ cmpData.grand }}\" window-a=\"{{ cmpData.windowA }}\" window-b=\"{{ cmpData.windowB }}\" cat-name=\"{{ cmpData.catName }}\" narrow=\"{{ isNarrow }}\" sample=\"{{ cmpData.sample }}\" on-pick=\"{{ cmpData.onPick }}\" hint-size=\"100%,640px\"><\u002Fdc-import>\n    <\u002Fsection>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <!-- ===================== DETAIL MODAL ===================== -->\n  <sc-if value=\"{{ detail }}\">\n    <div onclick=\"{{ closeDc }}\" style=\"position:fixed; inset:0; z-index:60; background:rgba(20,28,38,0.42); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; padding:18px;\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fff; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; border-radius:18px; padding:22px 24px 28px; box-shadow:0 24px 60px rgba(15,30,40,.28);\">\n        <div style=\"display:flex; align-items:flex-start; gap:12px; margin-bottom:20px;\">\n          <div style=\"margin-right:auto;\">\n            <div style=\"font-size:19px; font-weight:700;\">{{ detail.name }}<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#8b96a4; margin-top:2px;\">{{ detail.regionName }} · หมวด {{ catName }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right;\">\n            <div style=\"font-size:26px; font-weight:700; color:{{ detail.color }}; font-variant-numeric:tabular-nums; line-height:1;\">{{ detail.v }}<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:600; color:{{ detail.color }}; background:{{ detail.bg }}; padding:2px 9px; border-radius:20px; display:inline-block; margin-top:6px;\">{{ detail.label }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeDc }}\" style=\"border:none; background:#eef1f4; width:32px; height:32px; border-radius:9px; font-size:16px; color:#5f6b7a; cursor:pointer; flex-shrink:0;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:12px; margin-bottom:18px;\">\n          <div style=\"flex:1; background:#f6f8f9; border-radius:11px; padding:12px 14px;\">\n            <div style=\"font-size:11.5px; color:#7a8593;\">เฉลี่ย · ทุกสาเหตุ<\u002Fdiv>\n            <div style=\"font-size:19px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:2px;\">{{ detail.avgAll }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; background:#f6f8f9; border-radius:11px; padding:12px 14px;\">\n            <div style=\"font-size:11.5px; color:#7a8593;\">เฉลี่ย · ตัดสาเหตุลูกค้า<\u002Fdiv>\n            <div style=\"font-size:19px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:2px;\">{{ detail.avgExcl }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:12.5px; font-weight:700; color:#5f6b7a; margin-bottom:10px;\">รายเดือน<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:4px;\">\n          <sc-for list=\"{{ detail.rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:8px 10px; border-radius:9px; background:{{ r.rowBg }};\">\n              <div style=\"width:74px; font-size:12.5px; font-weight:600; color:#3a4654; flex-shrink:0;\">{{ r.mo }}<\u002Fdiv>\n              <div style=\"flex:1; height:9px; background:#eef1f4; border-radius:5px; overflow:hidden;\">\n                <div style=\"height:100%; width:{{ r.w }}; background:{{ r.c }}; border-radius:5px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:13.5px; font-weight:700; font-variant-numeric:tabular-nums; min-width:56px; text-align:right;\">{{ r.all }}<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#9aa3b0; font-variant-numeric:tabular-nums; min-width:54px; text-align:right;\">{{ r.excl }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:14px; justify-content:flex-end; margin-top:8px; font-size:10.5px; color:#9aa3b0;\">\n          <span>ค่าซ้าย = ทุกสาเหตุ<\u002Fspan><span>ค่าขวา = ตัดสาเหตุลูกค้า<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== REGION DETAIL MODAL ===================== -->\n  <sc-if value=\"{{ regionDetail }}\">\n    <div onclick=\"{{ closeRg }}\" style=\"position:fixed; inset:0; z-index:60; background:rgba(20,28,38,0.42); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; padding:18px;\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fff; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; border-radius:18px; padding:22px 24px 28px; box-shadow:0 24px 60px rgba(15,30,40,.28);\">\n        <div style=\"display:flex; align-items:flex-start; gap:12px; margin-bottom:20px;\">\n          <div style=\"margin-right:auto;\">\n            <div style=\"font-size:19px; font-weight:700;\">{{ regionDetail.name }}<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#8b96a4; margin-top:2px;\">{{ regionDetail.count }} DC · หมวด {{ catName }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right;\">\n            <div style=\"font-size:26px; font-weight:700; color:{{ regionDetail.color }}; font-variant-numeric:tabular-nums; line-height:1;\">{{ regionDetail.v }}<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:600; color:{{ regionDetail.color }}; background:{{ regionDetail.bg }}; padding:2px 9px; border-radius:20px; display:inline-block; margin-top:6px;\">{{ regionDetail.label }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeRg }}\" style=\"border:none; background:#eef1f4; width:32px; height:32px; border-radius:9px; font-size:16px; color:#5f6b7a; cursor:pointer; flex-shrink:0;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; gap:12px; margin-bottom:18px;\">\n          <div style=\"flex:1; background:#f6f8f9; border-radius:11px; padding:12px 14px;\">\n            <div style=\"font-size:11.5px; color:#7a8593;\">เฉลี่ย · ทุกสาเหตุ<\u002Fdiv>\n            <div style=\"font-size:19px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:2px;\">{{ regionDetail.avgAll }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1; background:#f6f8f9; border-radius:11px; padding:12px 14px;\">\n            <div style=\"font-size:11.5px; color:#7a8593;\">เฉลี่ย · ตัดสาเหตุลูกค้า<\u002Fdiv>\n            <div style=\"font-size:19px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:2px;\">{{ regionDetail.avgExcl }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:12.5px; font-weight:700; color:#5f6b7a; margin-bottom:10px;\">ค่าเฉลี่ยรายเดือน<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:4px; margin-bottom:18px;\">\n          <sc-for list=\"{{ regionDetail.rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; align-items:center; gap:12px; padding:8px 10px; border-radius:9px; background:{{ r.rowBg }};\">\n              <div style=\"width:74px; font-size:12.5px; font-weight:600; color:#3a4654; flex-shrink:0;\">{{ r.mo }}<\u002Fdiv>\n              <div style=\"flex:1; height:9px; background:#eef1f4; border-radius:5px; overflow:hidden;\">\n                <div style=\"height:100%; width:{{ r.w }}; background:{{ r.c }}; border-radius:5px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:13.5px; font-weight:700; font-variant-numeric:tabular-nums; min-width:56px; text-align:right;\">{{ r.all }}<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#9aa3b0; font-variant-numeric:tabular-nums; min-width:54px; text-align:right;\">{{ r.excl }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:14px; justify-content:flex-end; font-size:10.5px; color:#9aa3b0;\">\n          <span>ค่าซ้าย = ทุกสาเหตุ<\u002Fspan><span>ค่าขวา = ตัดสาเหตุลูกค้า<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { SLA: null, loadStatus: 'loading', fetchedAt: null, fallbackCats: [], daily: null, tab: 'overview', metric: 'all', category: 'total', regionFilter: 'all', sortCol: null, sortDir: 'desc', rSortCol: null, rSortDir: 'desc', q: '', openRegion: null, openDc: null, openRgDetail: null, vw: (typeof window !== 'undefined' ? window.innerWidth : 1200) };\n\n  componentWillUnmount() { if (this._onResize) window.removeEventListener('resize', this._onResize); }\n\n  async componentDidMount() {\n    await this.loadData();\n    this._onResize = () => { const v = window.innerWidth; if (v !== this.state.vw) this.setState({ vw: v }); };\n    window.addEventListener('resize', this._onResize);\n  }\n\n  async loadData() {\n    this.setState({ loadStatus: 'loading' });\n    // 1) ลองดึงสดจาก Google Sheet\n    try {\n      if (typeof window.SLA_loadLive === 'function') {\n        const live = await window.SLA_loadLive();\n        // กันเหนียว: ถ้า Sheet ส่งข้อมูลว่าง (เช่นกำลัง republish) ให้ตกไปใช้ข้อมูลสำรอง\n        const liveOk = (() => {\n          try {\n            const g = live && live.dataByCat && live.dataByCat.general && live.dataByCat.general.dcs;\n            if (!g || !g.length) return false;\n            return g.some(d => Array.isArray(d.all) && d.all.some(v => v != null));\n          } catch (e) { return false; }\n        })();\n        if (!liveOk) throw new Error('ข้อมูลสดว่าง');\n        let daily = null;\n        if (typeof window.SLA_loadDailyLive === 'function') {\n          try { daily = await window.SLA_loadDailyLive(); } catch (e) { daily = null; }\n        }\n        if (!daily) daily = window.SLA_buildDaily ? window.SLA_buildDaily(live) : null;\n        this.setState({ SLA: live, loadStatus: 'live', fetchedAt: live.fetchedAt, fallbackCats: live.fallbackCats || [], daily });\n        return;\n      }\n    } catch (e) {\n      console.warn('[SLA] ดึงข้อมูลสดไม่สำเร็จ ใช้ข้อมูลในไฟล์แทน:', e && e.message);\n    }\n    // 2) สำรอง: ข้อมูลฝังในไฟล์\n    try {\n      const STATIC = window.SLA_STATIC;\n      if (!STATIC) throw new Error('ไม่พบข้อมูลสำรอง');\n      this.setState({ SLA: STATIC, loadStatus: 'offline', fetchedAt: null, fallbackCats: [], daily: (window.SLA_buildDaily ? window.SLA_buildDaily(STATIC) : null) });\n    } catch (e) { console.error('SLA load failed', e); this.setState({ loadStatus: 'error' }); }\n  }\n\n  st(v) {\n    if (v == null) return { k: 'na', label: 'ไม่มีข้อมูล', color: '#8b96a4', bg: '#eef1f4', dot: '#c4ccd5' };\n    if (v >= 85) return { k: 'good', label: 'สูง', color: '#0f7a43', bg: '#e4f4ea', dot: '#1f9d57' };\n    if (v >= 70) return { k: 'mid', label: 'ปานกลาง', color: '#9a6a08', bg: '#fbf1d9', dot: '#dba31b' };\n    return { k: 'bad', label: 'ต่ำ', color: '#bf372a', bg: '#fbe5e1', dot: '#dd5043' };\n  }\n  avg(arr) { const x = arr.filter(v => v != null); return x.length ? x.reduce((a, b) => a + b, 0) / x.length : null; }\n  fmt(v, d = 1) { return v == null ? '—' : v.toFixed(d) + '%'; }\n  delta(v) {\n    if (v == null) return { s: '—', c: '#8b96a4', a: '' };\n    const sign = v > 0 ? '+' : '';\n    return { s: sign + v.toFixed(1), c: v > 0 ? '#1f9d57' : v < 0 ? '#dd5043' : '#8b96a4', a: v > 0 ? '▲' : v < 0 ? '▼' : '•' };\n  }\n  bars(series) {\n    return series.map((v) => ({\n      h: v == null ? '3%' : Math.max(3, v).toFixed(1) + '%',\n      c: v == null ? '#e2e6ec' : this.st(v).dot,\n    }));\n  }\n  heatCell(v, cur) {\n    let bg, color;\n    if (v == null) { bg = '#f4f6f8'; color = '#c2cad3'; }\n    else if (v >= 90) { bg = '#e7f0fb'; color = '#1d5fb0'; }\n    else if (v >= 80) { bg = '#f1f4f7'; color = '#1b2430'; }\n    else if (v >= 70) { bg = '#fbeae6'; color = '#c5392b'; }\n    else { bg = '#f6d9d2'; color = '#a82e22'; }\n    return { v: v == null ? '—' : v.toFixed(1) + '%', bg, color, weight: cur ? '700' : '600' };\n  }\n  avgC(v) { return v == null ? '#9aa3b0' : (v >= 90 ? '#1d5fb0' : (v < 80 ? '#dd5043' : '#1b2430')); }\n  barsBlue(series) {\n    const lo = 50, span = 95 - lo;\n    const vals = series.filter((v) => v != null);\n    const max = vals.length ? Math.max.apply(null, vals) : null;\n    const min = vals.length ? Math.min.apply(null, vals) : null;\n    return series.map((v) => {\n      if (v == null) return { h: '6%', c: '#e2e6ec' };\n      let c = '#8fbaea';\n      if (v === max) c = '#1d5fb0';\n      else if (v === min) c = '#dd5043';\n      const p = Math.max(0, Math.min(1, (v - lo) / span));\n      return { h: Math.max(7, p * 100).toFixed(1) + '%', c };\n    });\n  }\n  spark(series, uid) {\n    const W = 116, H = 30, PX = 3, padY = 4, lo = 50, span = 95 - lo, n = series.length;\n    const pts = [];\n    series.forEach((v, i) => {\n      if (v == null) return;\n      const x = n <= 1 ? PX : PX + (i / (n - 1)) * (W - 2 * PX);\n      const p = Math.max(0, Math.min(1, (v - lo) / span));\n      const y = H - padY - p * (H - padY * 2);\n      pts.push([x, y, v]);\n    });\n    if (!pts.length) return null;\n    const h = React.createElement;\n    // เส้นโค้งนุ่ม (Catmull-Rom → Bézier)\n    const sp = (arr) => {\n      if (arr.length < 2) return 'M' + arr[0][0].toFixed(1) + ',' + arr[0][1].toFixed(1);\n      let d = 'M' + arr[0][0].toFixed(1) + ',' + arr[0][1].toFixed(1);\n      for (let i = 0; i < arr.length - 1; i++) {\n        const p0 = arr[i - 1] || arr[i], p1 = arr[i], p2 = arr[i + 1], p3 = arr[i + 2] || p2;\n        const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;\n        const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;\n        d += ' C' + c1x.toFixed(1) + ',' + c1y.toFixed(1) + ' ' + c2x.toFixed(1) + ',' + c2y.toFixed(1) + ' ' + p2[0].toFixed(1) + ',' + p2[1].toFixed(1);\n      }\n      return d;\n    };\n    const lineD = sp(pts);\n    const last = pts[pts.length - 1];\n    const lastIdx = pts.length - 1;\n    let maxIdx = 0, minIdx = 0;\n    pts.forEach((p, i) => { if (p[2] > pts[maxIdx][2]) maxIdx = i; if (p[2] < pts[minIdx][2]) minIdx = i; });\n    const dots = pts.slice(0, -1).map((p, i) => h('circle', { key: 'd' + i, cx: p[0], cy: p[1], r: 1.7, fill: '#fff', stroke: '#5a8fd0', strokeWidth: 1 }));\n    // ป้ายตัวเลข: สูงสุด (บน) · ต่ำสุด (ล่าง) · ล่าสุด (บนจุดปลาย) — เดือนล่าสุดสำคัญสุด\n    const txt = (x, y, val, color, weight) => {\n      let anchor = 'middle';\n      if (x < 14) anchor = 'start'; else if (x > W - 14) anchor = 'end';\n      return h('text', { x: x.toFixed(1), y: y.toFixed(1), fill: color, fontSize: 6.8, fontWeight: weight, textAnchor: anchor, style: { fontVariantNumeric: 'tabular-nums' } }, val.toFixed(1));\n    };\n    const labels = [], usedL = {};\n    const addLabel = (idx, dy, color, weight) => { if (usedL[idx]) return; usedL[idx] = true; const p = pts[idx]; labels.push(txt(p[0], p[1] + dy, p[2], color, weight)); };\n    addLabel(lastIdx, -4.5, this.st(pts[lastIdx][2]).color, '700');\n    addLabel(maxIdx, -4.5, '#5d82bf', '600');\n    addLabel(minIdx, 9, '#cf6055', '600');\n    return h('svg', { width: W, height: H, viewBox: '0 0 ' + W + ' ' + H, style: { display: 'block', overflow: 'visible' } },\n      h('path', { d: lineD, fill: 'none', stroke: '#5a8fd0', strokeWidth: 1.6, strokeLinejoin: 'round', strokeLinecap: 'round' }),\n      dots,\n      h('circle', { cx: last[0], cy: last[1], r: 2.7, fill: this.st(last[2]).dot, stroke: '#fff', strokeWidth: 0.8 }),\n      labels\n    );\n  }\n\n  renderVals() {\n    const s = this.state, SLA = s.SLA;\n    const realNarrow = (s.vw || 1200) < 700;\n    const previewMobile = !!s.previewMobile && !realNarrow;\n    const isNarrow = realNarrow || previewMobile;\n    const stageStyle = previewMobile\n      ? 'min-height:100vh; background:#c9ced4; padding: nst regionChips = [{ id: 'all', name: 'ทุกภาค' }].concat(SLA.regions.map(r => ({ id: r.id, name: r.short }))).map(c => {\n      const cs = chipSel(s.regionFilter === c.id);\n      return { name: c.name, bg: cs.bg, color: cs.color, border: cs.border, onClick: () => this.setState({ regionFilter: c.id }) };\n    });\n\n    let detail = null;\n    const dd2 = en.find(x => x.name === s.openDc);\n    if (dd2) {\n      const raw = dcsRaw.find(x => x.name === s.openDc);\n      let dMax = -1, dMin = -1;\n      raw.all.forEach((v, i) => { if (v == null) return; if (dMax < 0 || v > raw.all[dMax]) dMax = i; if (dMin < 0 || v < raw.all[dMin]) dMin = i; });\n      detail = {\n        name: dd2.name, regionName: dd2.regionName, v: this.fmt(dd2.v), color: dd2.st.color, bg: dd2.st.bg, label: dd2.st.label,\n        avgAll: this.fmt(this.avg(raw.all)), avgExcl: this.fmt(this.avg(raw.excl)),\n        rows: months.map((mm, i) => ({ mo: SLA.monthsFull[i], all: this.fmt(raw.all[i]), excl: this.fmt(raw.excl[i]), w: (raw.all[i] == null ? 0 : raw.all[i]) + '%', c: raw.all[i] == null ? '#e2e6ec' : (i === dMin ? '#dd5043' : (i === dMax ? '#1d5fb0' : '#8fbaea')), rowBg: i === mo ? '#f1f7f6' : 'transparent' })),\n      };\n    }\n\n    // ---------- REGION DETAIL (คลิกที่ภาคในหน้าภาพรวม) ----------\n    let regionDetail = null;\n    if (s.openRgDetail) {\n      const rObj = SLA.regions.find(x => x.id === s.openRgDetail);\n      if (rObj) {\n        const rList = totDcs.filter(d => d.region === rObj.id);\n        const aS = months.map((_, i) => this.avg(rList.map(d => d.all[i])));\n        const eS = months.map((_, i) => this.avg(rList.map(d => d.excl[i])));\n        const now = aS[mo], stt = this.st(now);\n        let dMax = -1, dMin = -1;\n        aS.forEach((v, i) => { if (v == null) return; if (dMax < 0 || v > aS[dMax]) dMax = i; if (dMin < 0 || v < aS[dMin]) dMin = i; });\n        regionDetail = {\n          name: rObj.name, count: rList.length, v: this.fmt(now), color: stt.color, bg: stt.bg, label: stt.label,\n          avgAll: this.fmt(this.avg(aS)), avgExcl: this.fmt(this.avg(eS)),\n          rows: months.map((mm, i) => ({ mo: SLA.monthsFull[i], all: this.fmt(aS[i]), excl: this.fmt(eS[i]), w: (aS[i] == null ? 0 : aS[i]) + '%', c: aS[i] == null ? '#e2e6ec' : (i === dMin ? '#dd5043' : (i === dMax ? '#1d5fb0' : '#8fbaea')), rowBg: i === mo ? '#f1f7f6' : 'transparent' })),\n          goRegion: () => this.setState({ openRgDetail: null, tab: 'region', openRegion: rObj.id }),\n        };\n      }\n    }\n\n    // ---------- ANALYSIS ----------\n    const slopeOf = (ser) => {\n      const ps = []; ser.forEach((v, i) => { if (v != null) ps.push([i, v]); });\n      const n = ps.length; if (n < 2) return 0;\n      const sx = ps.reduce((a, p) => a + p[0], 0), sy = ps.reduce((a, p) => a + p[1], 0);\n      const sxx = ps.reduce((a, p) => a + p[0] * p[0], 0), sxy = ps.reduce((a, p) => a + p[0] * p[1], 0);\n      const den = n * sxx - sx * sx; return den === 0 ? 0 : (n * sxy - sx * sy) / den;\n    };\n    const anBase = dcsRaw.map(d => {\n      const ser = d[M], v = ser[mo], vals = ser.filter(x => x != null);\n      return { name: d.name, regionName: regName(d.region), v, sl: slopeOf(ser.slice(-3)),\n        range: vals.length ? Math.max.apply(null, vals) - Math.min.apply(null, vals) : 0,\n        mn: vals.length ? Math.min.apply(null, vals) : null, mx: vals.length ? Math.max.apply(null, vals) : null };\n    }).filter(d => d.v != null);\n    const slMeta = (sl) => sl > 0.5 ? { a: '▲', c: '#1f9d57' } : sl < -0.5 ? { a: '▼', c: '#dd5043' } : { a: '▬', c: '#9aa3b0' };\n    const anItem = (d) => { const m = slMeta(d.sl); return { name: d.name, regionName: d.regionName, v: this.fmt(d.v), slArrow: m.a, sl: (d.sl >= 0 ? '+' : '') + d.sl.toFixed(1), slColor: m.c, onClick: openDetail(d.name) }; };\n\n    const LV = 80, MM = 0.5, gCrit = [], gRec = [], gWatch = [], gStrong = [];\n    anBase.forEach(d => {\n      const low = d.v < LV, up = d.sl > MM, down = d.sl < -MM;\n      if (low && !up) gCrit.push(d);\n      else if (low && up) gRec.push(d);\n      else if (!low && down) gWatch.push(d);\n      else gStrong.push(d);\n    });\n    const CAP = 8;\n    const mkGroup = (title, desc, headBg, accent, arr, sorter) => {\n      const sorted = [...arr].sort(sorter);\n      return { title, desc, headBg, accent, count: String(arr.length), list: sorted.slice(0, CAP).map(anItem), moreText: arr.length > CAP ? '+' + (arr.length - CAP) + ' DC เพิ่มเติม' : '' };\n    };\n    const groupCards = [\n      mkGroup('🔴 วิกฤต — เร่งด่วน', 'ต่ำกว่า 80% และยังไม่ฟื้น', '#fbe9e6', '#dd5043', gCrit, (a, b) => a.v - b.v),\n      mkGroup('🟡 เฝ้าระวัง', 'สูงแต่กำลังถดถอย', '#fbf4dd', '#c9920f', gWatch, (a, b) => a.sl - b.sl),\n      mkGroup('🟠 กำลังฟื้น', 'ต่ำแต่แนวโน้มดีขึ้น', '#fdeedd', '#dd7a2a', gRec, (a, b) => b.sl - a.sl),\n      mkGroup('🟢 แข็งแรง', 'สูงและทรงตัว/ดีขึ้น', '#e6f4ec', '#1f9d57', gStrong, (a, b) => b.v - a.v),\n    ];\n\n    const causeAll = dcsRaw.map(d => {\n      const av = d.all[mo], ev = d.excl[mo];\n      if (av == null || ev == null) return null;\n      return { name: d.name, regionName: regName(d.region), all: av, excl: ev, gap: ev - av };\n    }).filter(Boolean);\n    const causeItem = (d) => ({ name: d.name, regionName: d.regionName, all: this.fmt(d.all), excl: this.fmt(d.excl), gap: '+' + d.gap.toFixed(1), onClick: openDetail(d.name) });\n    const fromCust = causeAll.filter(d => d.gap >= 3).sort((a, b) => b.gap - a.gap).slice(0, 8).map(causeItem);\n    const fromUs = causeAll.filter(d => d.excl < 80).sort((a, b) => a.excl - b.excl).slice(0, 8).map(causeItem);\n\n    const vol = [...anBase].filter(d => d.range > 0).sort((a, b) => b.range - a.range).slice(0, 6)\n      .map(d => ({ name: d.name, regionName: d.regionName, range: d.range.toFixed(1), mn: this.fmt(d.mn), mx: this.fmt(d.mx), onClick: openDetail(d.name) }));\n    const quick = anBase.filter(d => d.v >= 80 && d.v < 90).sort((a, b) => b.v - a.v).slice(0, 6)\n      .map(d => ({ name: d.name, regionName: d.regionName, v: this.fmt(d.v), need: (90 - d.v).toFixed(1), onClick: openDetail(d.name) }));\n\n    const bandColors = ['#2f74c9', '#b6bfca', '#e0a23a', '#dd5043'];\n    const bands = months.map((mm, i) => {\n      let c1 = 0, c2 = 0, c3 = 0, c4 = 0;\n      dcsRaw.forEach(d => { const v = d[M][i]; if (v == null) return; if (v >= 90) c1++; else if (v >= 80) c2++; else if (v >= 70) c3++; else c4++; });\n      const tot = (c1 + c2 + c3 + c4) || 1, cnts = [c1, c2, c3, c4];\n      return { label: mm, current: i === mo, lblColor: i === mo ? '#0e5a61' : '#8b96a4', lblWeight: i === mo ? '700' : '600',\n        segs: cnts.map((c, k) => ({ h: (c / tot * 100).toFixed(2) + '%', c: bandColors[k], lab: c >= 3 ? String(c) : '' })) };\n    });\n    const bandCount = (i) => { let hi = 0, lo = 0; dcsRaw.forEach(d => { const v = d[M][i]; if (v == null) return; if (v >= 90) hi++; else if (v < 80) lo++; }); return { hi, lo }; };\n    const b0 = bandCount(0), bN = bandCount(mo);\n    const dCnt = (now, prev, goodUp) => { const dv = now - prev; const good = goodUp ? dv > 0 : dv < 0; return { s: (dv > 0 ? '+' : '') + dv, a: dv > 0 ? '▲' : dv < 0 ? '▼' : '▬', c: dv === 0 ? '#9aa3b0' : (good ? '#1f9d57' : '#dd5043') }; };\n    const hiD = dCnt(bN.hi, b0.hi, true), loD = dCnt(bN.lo, b0.lo, false);\n    const gNow = grandRaw[M][mo], gStart = grandRaw[M][0];\n    const avD = this.delta((gNow != null && gStart != null) ? gNow - gStart : null);\n    const bandHead = {\n      hi: String(bN.hi), hiD: hiD.s, hiDColor: hiD.c, hiDArrow: hiD.a,\n      lo: String(bN.lo), loD: loD.s, loDColor: loD.c, loDArrow: loD.a,\n      avg: this.fmt(gNow), avgD: avD.s, avgDColor: avD.c, avgDArrow: avD.a,\n      total: String(anBase.length),\n    };\n    // ---------- DISTRIBUTION HEATMAP ----------\n    const counts = [[], [], [], []];\n    months.forEach((mm, i) => {\n      const c = [0, 0, 0, 0];\n      dcsRaw.forEach(d => { const v = d[M][i]; if (v == null) return; if (v >= 90) c[0]++; else if (v >= 80) c[1]++; else if (v >= 70) c[2]++; else c[3]++; });\n      c.forEach((x, k) => counts[k].push(x));\n    });\n    const heatColors = [{ r: 47, g: 116, b: 201 }, { r: 120, g: 132, b: 146 }, { r: 217, g: 138, b: 30 }, { r: 214, g: 69, b: 58 }];\n    const heatNames = ['≥90', '80–89', '70–79', '<70'];\n    const heatRows = counts.map((arr, k) => {\n      const rmax = Math.max.apply(null, arr) || 1, col = heatColors[k];\n      return {\n        name: heatNames[k], dot: 'rgb(' + col.r + ',' + col.g + ',' + col.b + ')',\n        cells: arr.map((v, i) => {\n          const a = v === 0 ? 0.05 : (0.16 + 0.84 * (v / rmax));\n          return { v: String(v), bg: 'rgba(' + col.r + ',' + col.g + ',' + col.b + ',' + a.toFixed(3) + ')', color: a > 0.55 ? '#ffffff' : '#1b2430', ring: i === mo ? 'inset 0 0 0 2px rgba(14,90,97,0.55)' : 'none' };\n        }),\n      };\n    });\n    const heatMonths = months.map((mm, i) => ({ label: mm, color: i === mo ? '#0e5a61' : '#5f6b7a', weight: i === mo ? '700' : '600' }));\n    const heat = { months: heatMonths, rows: heatRows };\n    const heatM = { months: heatMonths.slice(-3), rows: heatRows.map(r => ({ name: r.name, dot: r.dot, cells: r.cells.slice(-3) })) };\n\n    const an = { bandHead, bands, groupCards, fromCust, fromUs, vol, quick, heat, heatM };\n\n    const catKey = s.category;\n    const _pick = (name) => this.setState({ openDc: name });\n    const daily = s.daily || (window.SLA_buildDaily ? window.SLA_buildDaily(SLA) : null);\n    let dly, cmpData;\n    if (daily && daily.byCat && daily.byCat[catKey]) {\n      const cd = daily.byCat[catKey];\n      dly = { days: daily.days, rows: cd.dcs, grand: cd.grand, metric: M, monthName: daily.monthName, sample: daily.sample, onPick: _pick };\n      // แนบค่ารายเดือน ม.ค.–พ.ค. (ก่อนช่วง 1–20 มิ.ย.) ให้ตารางเทียบช่วง\n      const monthlyByName = {};\n      (CD.dcs || []).forEach(d => { monthlyByName[d.name] = d; });\n      const PRE = 6; // ม.ค.–มิ.ย. (รวมค่าทั้งเดือน มิ.ย. เป็นบริบทก่อนเทียบช่วงย่อย)\n      const cmpMonths = SLA.months.slice(0, PRE);\n      const cmpRows = cd.dcs.map(r => {\n        const md = monthlyByName[r.name];\n        return Object.assign({}, r, {\n          mAll: md ? md.all.slice(0, PRE) : [],\n          mExcl: md ? md.excl.slice(0, PRE) : [],\n        });\n      });\n      const gM = CD.grand || {};\n      cmpData = { rows: cmpRows, grand: Object.assign({}, cd.grand, { mAll: Array.isArray(gM.all) ? gM.all.slice(0, PRE) : [], mExcl: Array.isArray(gM.excl) ? gM.excl.slice(0, PRE) : [] }), metric: M, catName, sample: daily.sample, windowA: daily.windowA, windowB: daily.windowB, months: cmpMonths, onPick: _pick };\n    } else {\n      dly = { days: [], rows: [], grand: {}, metric: M, monthName: '', sample: false, onPick: _pick };\n      cmpData = { rows: [], grand: {}, metric: M, catName, sample: false, labelA: '1–20 มิ.ย.', labelB: '21–25 มิ.ย.', months: [], onPick: _pick };\n    }\n\n    return {\n      ...head, catEmpty: false, catName,\n      showOverview: s.tab === 'overview', showRegion: s.tab === 'region', showDc: s.tab === 'dc', showAnalysis: s.tab === 'analysis',\n      showDaily: s.tab === 'daily', showCompare: s.tab === 'compare', showCompare2: s.tab === 'compare2', dly, cmpData, an,\n      kpi, trendCols, regionRows, regionsEx, worst, regionScores, regionTrend,\n      ovCards, ovLow, ovStanding, tcTotal, tcGen, tcCold, ovRegions, ovGrand, worstOv, topOv,\n      sumMonth: monthLabel, sumHeadVal, sumHeadColor, sumDeltaText, sumDeltaColor, sumDeltaArrow, sumPoints, sumHeadFs, sumPtFs,\n      regionMobile: isNarrow, regionDesktop: !isNarrow,\n      regionChips, q: s.q, onSearch: (ev) => this.setState({ q: ev.target.value }),      sortName, sortAvg, sortChange, dcRows, monthHeads, monthHeadsM, causeLabel, dcCount: dcRows.length, monthLabel,\n      rgMonthHeads, rgMonthHeadsM, rgSortName, rgSortAvg, rgSortDelta,\n      detail, closeDc: () => this.setState({ openDc: null }), stop: (ev) => ev.stopPropagation(),\n      regionDetail, closeRg: () => this.setState({ openRgDetail: null }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
